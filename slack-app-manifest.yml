_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: Cafe Random Coffee
  description: Slack-first random coffee pairings for a channel.
  background_color: "#6F4E37"

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: true
  bot_user:
    display_name: Cafe
    always_online: false

oauth_config:
  scopes:
    bot:
      # App Home + interactions
      - app_mentions:read
      # Channel membership/source-of-truth lookup
      - channels:read
      - groups:read
      # User lookup/filtering and optional verified calendar invite email mapping
      - users:read
      - users:read.email
      # Individual DM notifications/reminders
      - chat:write
      - im:write

settings:
  event_subscriptions:
    bot_events:
      - app_home_opened
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
