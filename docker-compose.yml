services:
  cafe:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_PATH: /data/cafe.sqlite
      GOOGLE_CALENDAR_CREDENTIALS_PATH: /run/secrets/google-calendar-credentials.json
      PI_CODING_AGENT_DIR: /root/.pi/agent
    volumes:
      - ./data:/data
      - ./${GOOGLE_CALENDAR_CREDENTIALS_PATH:-google-calendar-credentials.json}:/run/secrets/google-calendar-credentials.json:ro
      - ${HOME}/.pi/agent:/root/.pi/agent:ro
